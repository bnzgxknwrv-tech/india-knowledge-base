schema_version: 1
rules:
  no_iteration_1_deletions: true
  preserve_unique_history: true
files:
  pipeline/ENTRYPOINT.md: REPLACE
  pipeline/NEXT_ACTION.yaml: UPDATE
  pipeline/roles/BRONS.md: ARCHIVE
  pipeline/roles/ZILVER.md: ARCHIVE
  pipeline/roles/GOUD.md: ARCHIVE
  pipeline/protocols/EXECUTION_PROTOCOL.md: ARCHIVE
  pipeline/protocols/CONTROLLER_TRANSITION_PROTOCOL.md: ARCHIVE
  pipeline/protocols/GEO_LOCATION_PROTOCOL.md: ARCHIVE
  pipeline/QUALITY_GATE.md: ARCHIVE
  decisions/INDEX.yaml: KEEP
  decisions/DECISION-0013-location-ids-and-verified-geo-data.md: KEEP
  decisions/DECISION-0014-corridor-strict-a-working-geo-and-kml.md: KEEP
  research/active/**: KEEP
  knowledge/**: KEEP
  pipeline/templates/**: ARCHIVE
  pipeline/tests/**: KEEP
  india3/migration/PREFLIGHT_STATUS.yaml: DELETE_AFTER_MIGRATION
notes:
  - Legacy files remain readable for pinned historical runs.
  - Active interpretation moves exclusively to INDIA3 through ACTIVE_SYSTEM and ENTRYPOINT.
