instruction: >-
  Voer uitsluitend de BRONS-fase van KUMAON-COMPLETE-001 uit volgens het gepinde BRONS_MIN-contextmanifest.
  Dit is een volledige geografische en inhoudelijke Kumaon-clustersweep, niet een herbeoordeling van het geaccepteerde
  INDIA2-rapport van VRINDAVAN-KUMAON-CORRIDOR-001. Onderzoek alle formele en bekende onbeoordeelde fysieke locaties,
  alle verplichte detectoren en alle geografische subclusters. Leg negatieve zoekresultaten vast. Onderzoek Bhowali,
  Nainital, Kainchi, Kathgodam, Haldwani en waar relevant Lal Kuan als vergelijkbare mogelijke eerste bases of
  aankomstknooppunten, maar kies nog geen station, basis, hotel, eerste bezoeklocatie, interne route, laatste Kumaon-locatie
  of uitreisrichting. Behoud alle formele A/B/C en LOCATION_IDs exact. Ken geen formele of adviserende A/B/C toe en maak
  geen nieuw decision-ID. Gebruik WORKING_GEO met de gepinde fallback, wijs nieuwe Kumaon-IDs uitsluitend vanaf 427 toe
  nadat fysieke identiteit voldoende is vastgesteld en houd iedere onderzochte kaartbare locatie zichtbaar. Bouw de volledige
  eerste Kumaon-KML met de zeven verplichte lagen en alle vereiste bron-, praktische, nabijheids-, basisvergelijkings-,
  station-, detector-, kandidaten- en compleetheidsartifacts. Maak geen PARELS en geen definitieve route. Gebruik bij een
  lange uitvoering gecontroleerde checkpoints onder dezelfde workerclaim. Schrijf en valideer alle BRONS-output in GitHub,
  sluit de workerclaim in de completioncommit en voer daarna uitsluitend de gepinde afzonderlijke inline controllertransition
  BRONS naar ZILVER uit. Lever alleen bij geldige finale readback een uitvoerbare ZILVER-handoff.
