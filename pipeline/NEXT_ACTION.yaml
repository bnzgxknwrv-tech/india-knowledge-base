instruction: >-
  Voer uitsluitend de BRONS-fase van KUMAON-ROUTE-OPTIMIZATION-001 uit volgens het gepinde BRONS_MIN-contextmanifest.
  Gebruik KUMAON-COMPLETE-001 op completioncommit 41a77b967d784de5babb67d603becf2b9f2ebf75 als inhoudelijk voltooide
  Kumaon-onderlaag en voer geen nieuwe brede Kumaon-sweep uit. Onderzoek uitsluitend routeoptimalisatie voor 19 december
  2026 tot en met 21 januari 2027: aankomststation of aankomstwijze, eerste basis en eerste formele A, volledige interne
  Kumaon-route, optimale basiswissels en overnachtingsverdeling, laatste Kumaon-locatie en beste uitgang, keuze van het
  logisch volgende reeds bestaande projectcluster en een voorlopige clusterketen voor de rest van de reis. Vergelijk
  minimaal Haridwar/Kankhal, Varanasi, Bodh Gaya en Kolkata/Dakshineswar plus andere reeds formeel bestaande clusters
  wanneer geografisch logischer, maar start geen inhoudelijk onderzoek van het volgende cluster. Vergelijk trein en
  vliegtuig op volledige deur-tot-deurtijd, totale kosten, bagage, transfers, eventueel noodzakelijke hotelnacht en
  effectieve verloren daguren. Gebruik nooit bus. Gebruik auto/taxi alleen kort, voor bergtrajecten en first/last mile.
  Reken bij vluchten met rugzak/dagtas plus 23 kg ruimbagage. Registreer voor ieder aanbevolen treintraject beginstation,
  alle tussenstops en eindstation met stationscode, trein, volgorde, tijden en stopduur waar betrouwbaar beschikbaar en
  markeer exact waar Mark in- en uitstapt. Bereid grijze treinmarkers met één treinlogo en detectorinput voor mogelijke
  latere zware-A-sweeps langs haltes; een halte wordt nooit automatisch A. Behoud alle formele A/B/C exact, ken geen
  nieuwe formele of adviserende A/B/C toe en gebruik D_DOOR_MARK_TE_BEOORDELEN als mensvriendelijke naam voor onbeoordeeld,
  waarbij D geen vierde waarderingsklasse is. Lever alle in scope.md verplichte BRONS-artifacts en routegerichte registers,
  inclusief volledige alternatieven, bronregisters, stationreeksen, kostencomponenten, live-recheckregister en technische
  input voor KUMAON_ROUTE_OPTIMIZED.kml en MASTER-INDIA-KML-001. Maak geen hotelboeking, treinboeking of vluchtboeking.
  Behandel dienstregelingen, prijzen, winterwegen, trails, taxi's, parking en reistijden als tijdgevoelig en pin concrete
  latere live rechecks. Schrijf en commit de volledige BRONS-fase, sluit de workerclaim in de completioncommit en voer
  daarna alleen bij geldige completion als afzonderlijke inline controller de overgang naar ZILVER uit.
