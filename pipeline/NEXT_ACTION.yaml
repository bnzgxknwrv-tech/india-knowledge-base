mandatory_first_instruction: >-
  Activeer in deze chat onmiddellijk de GitHub-connector en houd deze gedurende de volledige uitvoering beschikbaar.
  Dit onderzoek gebruikt GitHub als enige bron van waarheid en overdrachtskanaal. Test vóór ieder inhoudelijk werk
  zowel GitHub-read als GitHub-write voor repository bnzgxknwrv-tech/india-knowledge-base. Ontbreekt read of write,
  antwoord dan uitsluitend: MARK: IK MIS GITHUB CONNECTOR! Ga alleen verder wanneer beide aantoonbaar werken.
instruction: >-
  Voer uitsluitend de BRONS-fase van VARANASI-COMPLETE-001 uit volgens het gepinde BRONS_MIN-contextmanifest.
  Voer één volledige brede Varanasi/Kashi-clustersweep uit met alle verplichte detectoren, fysieke-plekcontrole,
  historische en spirituele broncontrole, lineage- en traditieclassificatie, actuele bezoekbaarheid, devotionele praktijk,
  deelname voor Mark, beelden, recente beleving, nabijheid en loopclusters. Behoud alle bestaande formele A/B/C-statussen;
  alleen Mark wijzigt formele status. Maak nieuwe statusvoorstellen uitsluitend adviserend en traceerbaar.

  Voer parallel de volledige repositorybrede A/B-kaartopdracht uit. Verzamel letterlijk alle geldige formele A's en B's
  uit de gepinde statusbronnen, decisions en canonieke registry. Herwaardeer niets. Hergebruik geldige bestaande GEO.
  Wanneer een bruikbaar exact punt ontbreekt, gebruik direct een herkenbare Google Maps-pin, terreincentrum, adrespunt
  of verantwoord lokaal werkpunt. Circa 100 meter afwijking is acceptabel; bereken niet kunstmatig de exacte afwijking
  en laat deur- of ingangprecisie de opname niet blokkeren. Leg bron, GEO-status en onzekerheid zichtbaar vast.

  Bouw en onderhoud `research/active/VARANASI-COMPLETE-001/shared/MASTER_A_B_GEO_REGISTRY.jsonl` als enige bewerkbare
  kaartbron. Gebruik het gepinde schema. Bereid een deterministisch gegenereerde KML voor met exact twee hoofdlagen:
  A_FORMEEL groen en B_FORMEEL oranje. Gebruik eenvoudige uniforme pins zonder categorie-logo's. Iedere markernaam moet
  direct begrijpelijk zijn; voeg bij voornamelijk Indiase namen tussen haakjes een korte Nederlandse functie toe,
  bijvoorbeeld `Kashi Vishwanath (Shiva-tempel)`. Neem geen C's, treinhaltes, routes, bases of hotels op.

  Bewaar alle eerdere BRONS-, ZILVER- en GOUD-output volledig. Overschrijf geen oude BRONS-informatie en wijzig niets
  onder KUMAON-ROUTE-OPTIMIZATION-001. Schrijf alle verplichte BRONS-artifacts in het nieuwe runpad. Valideer dat
  formele A/B-bron, actieve registryrecords en voorbereide KML-placemarks exact dezelfde dekking hebben, zonder dubbele
  LOCATION_ID's of stille weglatingen. Commit de volledige BRONS-fase en sluit de BRONS-workerclaim in de completioncommit.
  Maak als worker geen ZILVER-context. Alleen na geldige completion en formele workerbeëindiging mag dezelfde sessie als
  afzonderlijke inline controller de gepinde transition naar ZILVER uitvoeren en de controllerclaim sluiten.
