schema_version: 1
run_id: VARANASI-GEO-DELIVERY-REPAIR-001
system: INDIA4
status: READY_FOR_BRONS
created_at: 2026-07-24
objective:
  - Onderzoek alle 40 Varanasi-kandidaten opnieuw op fysieke locatie.
  - Behandel bestaande coördinaten uitsluitend als vergelijkingsmateriaal.
  - Maak per kandidaat één afzonderlijk GEO-auditrecord.
  - Isoleer kandidaatgebonden onzekerheid en ga door met alle overige kandidaten.
  - Laat BRONS, ZILVER en GOUD de volledige keten uitvoeren.
  - Laat GOUD alle praktische eindproducten werkelijk maken.
source_runs:
  - VARANASI-COMPLETE-001
legacy_input_paths:
  - research/active/VARANASI-COMPLETE-001/ZILVER/candidates.jsonl
  - research/active/VARANASI-COMPLETE-001/ZILVER/working_geo.jsonl
  - research/active/VARANASI-GEO-DELIVERY-REPAIR-001/run.yaml
  - decisions/MARK_DECISIONS.jsonl
protected_mark_decisions:
  VNS-CAND-001: A
  VNS-CAND-002: A
  VNS-CAND-003: A
  VNS-CAND-007: A
  VNS-CAND-008: B
  all_other_35: DOOR_MARK_TE_BEOORDELEN
explicit_rejections:
  - candidate_id: VNS-CAND-008
    coordinate: [25.3045, 82.979369]
    rule: MUST_NOT_BE_REUSED_AS_FINAL_POINT_WITHOUT_LATER_EXPLICIT_MARK_DECISION
research_scope:
  candidate_count: 40
  geography: Varanasi
  rule: EACH_CANDIDATE_RESEARCHED_SEPARATELY
required_role_outputs:
  BRONS:
    - BRONS/SOURCES.jsonl
    - BRONS/GEO_AUDIT.jsonl
    - BRONS/HANDOFF.md
  ZILVER:
    - ZILVER/SOURCES_VALIDATED.jsonl
    - ZILVER/GEO_AUDIT_VALIDATED.jsonl
    - ZILVER/CORRECTIONS.jsonl
    - ZILVER/HANDOFF.md
  GOUD:
    - GOUD/USER/VARANASI_40_KANDIDATEN.kml
    - GOUD/USER/VARANASI_KEUZE.pdf
    - GOUD/GEO_AUDIT.md
    - GOUD/CORRECTIERAPPORT.md
    - GOUD/ZEKER_ONZEKER_OVERZICHT.md
    - GOUD/MARK_KEUZES.md
    - GOUD/DOOR_MARK_TE_BEOORDELEN.md
    - GOUD/COMPLETION.md
forbidden_outputs:
  - CENTRAL_INDIA_MASTER_KML_UPDATE
candidate_uncertainty_policy: ISOLATE_AND_CONTINUE
role_sequence: [BRONS, ZILVER, GOUD]
current_role: BRONS
completioncommits:
  BRONS: null
  ZILVER: null
  GOUD: null
original_mark_instruction: |
  Bouw INDIA 4 als eenvoudige opvolger van INDIA 3 en activeer deze Varanasi GEO-herstelopdracht als eerste BRONS-run. Voer tijdens de architectuurmigratie nog geen volledig onderzoek naar de 40 kandidaten uit.
