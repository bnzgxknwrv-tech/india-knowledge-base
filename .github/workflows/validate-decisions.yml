name: Validate decisions

on:
  pull_request:
    paths:
      - 'decisions/**'
      - 'pipeline/validators/validate_decisions.py'
      - '.github/workflows/validate-decisions.yml'
  push:
    branches:
      - main
    paths:
      - 'decisions/**'
      - 'pipeline/validators/validate_decisions.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python pipeline/validators/validate_decisions.py
