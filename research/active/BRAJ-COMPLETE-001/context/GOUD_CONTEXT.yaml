required_focus:
  - Preserve and synthesize all 29 candidates; do not remove potential C locations.
  - Resolve or honestly preserve open images, reviews, participation, visitability, object-management and proximity layers.
  - Assign one unique permanent LOCATION_ID from the BRAJ 200-299 block to every candidate.
  - Produce geo_locations.jsonl with verified WGS84 point, point type, verification status, sources, Google Maps URL and point-choice reason.
  - Prefer VISITOR_ENTRANCE for visitable complexes and reject same-name businesses, wrong entrances and arbitrary centres.
  - Use two independent GEO sources where possible; otherwise classify the limitation without guessing.
  - Produce geo_connections.jsonl using the verified endpoints for every reported walking or travel time.
  - Include from/to LOCATION_ID, mode, estimated time, source or method and checked date.
  - Produce location_id_audit.md proving unique IDs, BRAJ-block compliance, no overlaps and complete C retention.
  - Do not generate KML and do not assign formal or advisory A/B/C.
