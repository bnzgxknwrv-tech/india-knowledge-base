execution_checkpoint_policy:
  reason: prior 40-candidate local output was lost before durable GitHub write
  mandatory: true
  rules:
    - create SOURCES.jsonl and GEO_AUDIT.jsonl in GitHub before researching more than five candidates
    - after every maximum of five completed candidates, update and read back both checkpoint files
    - every checkpoint must contain only complete valid JSONL records; never partial lines
    - record candidate IDs covered and current source-ID range in HANDOFF.md or a BRONS checkpoint status file
    - do not postpone the first durable write until all 40 candidates are complete
    - if tool budget becomes constrained, stop after the latest read-backed checkpoint rather than continuing locally
    - report every unused blob SHA explicitly before stopping
  completion_condition: final files contain all 40 records and pass full readback
